version: "3.9"

services:
  xtunnel-server:
    build:
      context: .
      target: server
    container_name: xtunnel-server
    restart: unless-stopped
    ports:
      - "8080:8080"    # HTTP proxy
      - "8443:8443"    # HTTPS proxy
      - "7000:7000"    # Control plane (WebSocket)
      - "2222:2222"    # SSH gateway
      - "7001:7001"    # REST API / metrics
      - "10000-10100:10000-10100"  # TCP tunnel ports
    volumes:
      - ./configs/server.json:/etc/xtunnel/server.json:ro
      - xtunnel-certs:/etc/xtunnel/certs
    environment:
      - XTUNNEL_DOMAIN=xtunnel.io
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  xtunnel-dashboard:
    build:
      context: ./dashboard
    container_name: xtunnel-dashboard
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - xtunnel-server
    environment:
      - VITE_API_URL=http://localhost:7001

volumes:
  xtunnel-certs:
